<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Médico - Demonstração</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Monitor de Sinais Vitais</h1>
        <div id="status-conexao" class="badge-status">Simulação Ativa</div>
        
        <main class="card">
            <div class="card-label">Batimentos</div>
            <div id="bpm-valor" class="valor">75 <span class="unidade">BPM</span> <span class="coracao">❤️</span></div>
        </main>

        <footer id="mensagem" class="card status-estavel">
            ✅ Paciente Estável
        </footer>

        <section class="card-simulacao">
            <h3>Painel de Demonstração</h3>
            <button onclick="injectData(75, false, false)">Normal</button>
            <button onclick="injectData(110, true, false)">Simular Queda</button>
            <button onclick="injectData(90, false, true)">Simular SOS</button>
            <button onclick="injectData(45, false, false)">Simular Crise (Baixo BPM)</button>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
