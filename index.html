<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthPulse | Monitoramento IoT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>HealthPulse v1.0</h1>
            <div id="status-tag" class="badge">Conectando...</div>
        </header>

        <main>
            <div class="card">
                <p>Frequência Cardíaca</p>
                <div id="bpm-valor" class="bpm-display">--</div>
                <div id="status-msg">Aguardando dados...</div>
            </div>

            <div class="card" id="painel-simulacao">
                <small>Modo de Demonstração</small>
                <div style="margin-top: 10px;">
                    <button onclick="injectData(75, false, false)">Normal</button>
                    <button onclick="injectData(110, true, false)">Queda</button>
                    <button onclick="injectData(90, false, true)">SOS</button>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
